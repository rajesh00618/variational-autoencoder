version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vae-explorer
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./models:/app/models
      - ./results:/app/results
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
